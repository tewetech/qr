    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Quicksand', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        fresh: {
                            bg: '#f8fafc',
                            primary: '#079790',
                            dark: '#0f172a',
                            light: '#ffffff'
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01)',
                        'glow': '0 0 15px rgba(16, 185, 129, 0.3)',
                    }
                }
            }
        }

    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #079790;
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }
        .bg-grid-pattern {
            background-size: 30px 30px;
            background-image: linear-gradient(to right, rgba(226, 232, 240, 0.4) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(226, 232, 240, 0.4) 1px, transparent 1px);
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }
        .fresh-card {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #f1f5f9;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border-radius: 20px;
        }
        .active-tab { 
            background-color: #079790 !important; 
            color: white !important; 
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2) !important;
        }
        input, textarea { 
            border: 1px solid #e2e8f0 !important; 
            border-radius: 12px !important; 
            font-family: 'Quicksand', sans-serif !important;
            font-weight: 500 !important;
            font-size: 0.8rem !important;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }
        input:focus, textarea:focus {
            background-color: #ffffff;
            border-color: #079790 !important;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1) !important;
            outline: none;
        }
        #reader { 
            border: 1px solid #e2e8f0 !important; 
            border-radius: 16px; 
            overflow: hidden; 
            width: 100% !important; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        #reader video { object-fit: cover !important; }
        .btn-fresh { 
            border-radius: 12px !important; 
            transition: all 0.2s; 
            font-weight: 700;
        }
        .btn-fresh:active {
            transform: scale(0.98);
        }
        .hover-lighter {
            transition: filter 0.2s ease;
        }
        .hover-lighter:hover {
            filter: brightness(1.15);
        }
        #toast-container { transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out; }
        
        @keyframes shimmer-bg {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer-effect {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer-bg 1.5s infinite linear;
        }
        .btn-processing {
            position: relative;
            overflow: hidden;
            pointer-events: none;
            opacity: 0.8;
        }
        .btn-processing::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer-btn 1s infinite linear;
        }
        @keyframes shimmer-btn {
            100% { left: 100%; }
        }
    </style>
</head>

    <script>
        let html5QrCode;
        let isCameraRunning = false;
        let currentWifiPass = "";
        let generatedImages = [];
        let generationCount = 0;
        
        let currentType = 'link';
        let currentFormat = 'qr';
        let currentAuth = 'WPA';

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const txt = document.getElementById('toast-msg');
            txt.innerText = msg;
            container.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => {
                container.classList.add('opacity-0', 'translate-y-4');
            }, 3000);
        }

        function switchTab(tab) {
            const genSec = document.getElementById('section-generator');
            const scanSec = document.getElementById('section-scanner');
            const btnGen = document.getElementById('btn-tab-gen');
            const btnScan = document.getElementById('btn-tab-scan');
            if (tab === 'gen') {
                genSec.classList.remove('hidden');
                scanSec.classList.add('hidden');
                btnGen.classList.add('active-tab', 'bg-transparent');
                btnGen.classList.remove('bg-transparent', 'text-slate-500', 'hover:bg-white', 'hover:shadow-sm');
                btnScan.classList.remove('active-tab');
                btnScan.classList.add('bg-transparent', 'text-slate-500', 'hover:bg-white', 'hover:shadow-sm');
                stopCamera();
            } else {
                genSec.classList.add('hidden');
                scanSec.classList.remove('hidden');
                btnGen.classList.remove('active-tab');
                btnGen.classList.add('bg-transparent', 'text-slate-500', 'hover:bg-white', 'hover:shadow-sm');
                btnScan.classList.add('active-tab');
                btnScan.classList.remove('bg-transparent', 'text-slate-500', 'hover:bg-white', 'hover:shadow-sm');
                setScanMode('camera'); 
            }
        }

        function toggleDropdown(id) {
            document.querySelectorAll('[id^="dropdown-"]').forEach(el => {
                if (el.id !== id) el.classList.add('hidden');
            });
            const el = document.getElementById(id);
            el.classList.toggle('hidden');
        }

        function selectType(type, label, icon) {
            currentType = type;
            const isFab = icon === 'fa-whatsapp' ? 'fab' : 'fas';
            document.getElementById('label-select-type').innerHTML = `<i class="${isFab} ${icon} text-fresh-primary w-4 text-center mr-1"></i> ${label}`;
            document.getElementById('dropdown-type').classList.add('hidden');
            
            document.getElementById('input-group-link').classList.add('hidden');
            document.getElementById('input-group-wifi').classList.add('hidden');
            document.getElementById('input-group-whatsapp').classList.add('hidden');
            
            if (type === 'link') document.getElementById('input-group-link').classList.remove('hidden');
            else if (type === 'wifi') {
                document.getElementById('input-group-wifi').classList.remove('hidden');
                toggleWifiPass();
            }
            else if (type === 'whatsapp') document.getElementById('input-group-whatsapp').classList.remove('hidden');
        }

        function selectFormat(format, label, icon) {
            currentFormat = format;
            document.getElementById('label-select-format').innerHTML = `<i class="fas ${icon} text-fresh-primary w-4 text-center mr-1"></i> ${label}`;
            document.getElementById('dropdown-format').classList.add('hidden');
        }

        function selectAuth(auth, label) {
            currentAuth = auth;
            document.getElementById('label-select-auth').innerText = label;
            document.getElementById('dropdown-auth').classList.add('hidden');
            toggleWifiPass();
        }

        function toggleWifiPass() {
            const passInput = document.getElementById('wifi-pass');
            if(currentAuth === 'nopass') {
                passInput.classList.add('hidden');
                passInput.value = '';
            } else {
                passInput.classList.remove('hidden');
            }
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#btn-select-type') && !e.target.closest('#dropdown-type')) {
                document.getElementById('dropdown-type')?.classList.add('hidden');
            }
            if (!e.target.closest('#btn-select-format') && !e.target.closest('#dropdown-format')) {
                document.getElementById('dropdown-format')?.classList.add('hidden');
            }
            if (!e.target.closest('#btn-select-auth') && !e.target.closest('#dropdown-auth')) {
                document.getElementById('dropdown-auth')?.classList.add('hidden');
            }
        });

        function generateQR() {
            const type = currentType;
            const format = currentFormat;
            let dataArray = [];

            if (type === 'link') {
                const rawText = document.getElementById('input-text').value;
                dataArray = rawText.split('\n').map(t => t.trim()).filter(t => t !== '');
            } else if (type === 'wifi') {
                const ssid = document.getElementById('wifi-ssid').value.trim();
                const pass = document.getElementById('wifi-pass').value;
                const auth = currentAuth;
                if (!ssid) return showToast("SSID Kosong");
                let finalData = (auth === 'nopass') ? `WIFI:T:nopass;S:${ssid};;` : `WIFI:T:${auth};S:${ssid};P:${pass};;`;
                dataArray.push(finalData);
            } else if (type === 'whatsapp') {
                let number = document.getElementById('wa-number').value;
                const msg = document.getElementById('wa-msg').value;
                if (!number) return showToast("No HP Kosong");
                number = number.replace(/[^0-9]/g, '');
                if (number.startsWith('0')) number = '62' + number.slice(1);
                dataArray.push(`https://wa.me/${number}?text=${encodeURIComponent(msg)}`);
            }

            if (dataArray.length === 0) return showToast("Data Kosong");

            const btnGen = document.getElementById('btn-generate');
            btnGen.classList.add('btn-processing');
            btnGen.innerText = 'MEMPROSES...';

            document.getElementById('qr-modal').classList.remove('hidden');
            document.getElementById('qrcode').classList.add('hidden');
            document.getElementById('qr-loading').classList.remove('hidden');
            document.getElementById('bulk-info').classList.add('hidden');
            document.getElementById('qrcode').innerHTML = '';

            setTimeout(() => {
                generatedImages = [];
                generationCount = 0;

                dataArray.forEach((data, index) => {
                    if (format === 'qr') {
                        const tempDiv = document.createElement('div');
                        new QRCode(tempDiv, { 
                            text: data, 
                            width: 160, 
                            height: 160, 
                            colorDark: "#000000", 
                            colorLight: "rgba(255,255,255,0)", 
                            correctLevel: QRCode.CorrectLevel.H 
                        });
                        setTimeout(() => {
                            const canvas = tempDiv.querySelector('canvas');
                            if (canvas) {
                                generatedImages[index] = canvas.toDataURL("image/png");
                            }
                            checkGenerationComplete(dataArray.length, format);
                        }, 50);
                    } else {
                        try {
                            const canvas = document.createElement('canvas');
                            JsBarcode(canvas, data, { 
                                width: 2, 
                                height: 60, 
                                displayValue: true, 
                                margin: 10, 
                                lineColor: "#000000",
                                background: "rgba(255,255,255,0)"
                            });
                            generatedImages[index] = canvas.toDataURL("image/png");
                        } catch(e) {}
                        checkGenerationComplete(dataArray.length, format);
                    }
                });

                btnGen.classList.remove('btn-processing');
                btnGen.innerText = 'GENERATE SEKARANG';
            }, 800);
        }

        function checkGenerationComplete(total, format) {
            generationCount++;
            if (generationCount === total) {
                const validImages = generatedImages.filter(img => img);
                if(validImages.length === 0) {
                    document.getElementById('qr-modal').classList.add('hidden');
                    return showToast("Gagal menghasilkan kode");
                }
                
                const firstImg = document.createElement('img');
                firstImg.src = validImages[0];
                firstImg.className = format === 'barcode' ? 'w-full h-auto max-h-[140px] object-contain rounded-lg' : 'w-[160px] h-[160px] rounded-xl';
                
                document.getElementById('qrcode').appendChild(firstImg);

                if (total > 1) {
                    const info = document.getElementById('bulk-info');
                    info.innerText = `Memproses ${validImages.length} Data Sekaligus`;
                    info.classList.remove('hidden');
                }
                document.getElementById('qr-loading').classList.add('hidden');
                document.getElementById('qrcode').classList.remove('hidden');
            }
        }

        function closeModal() {
            document.getElementById('qr-modal').classList.add('hidden');
        }

        function downloadQR() {
            const validImages = generatedImages.filter(img => img);
            if (validImages.length === 0) return showToast("Kode belum siap");

            if (validImages.length === 1) {
                const link = document.createElement('a');
                link.href = validImages[0];
                link.download = 'QR_TeweTech.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else {
                showToast("Menyiapkan File ZIP...");
                const zip = new JSZip();
                validImages.forEach((dataUrl, i) => {
                    const base64 = dataUrl.split(',')[1];
                    zip.file(`QR_${i + 1}.png`, base64, {base64: true});
                });
                zip.generateAsync({type:"blob"}).then(function(content) {
                    saveAs(content, "hasil_generate.zip");
                });
            }
        }

        function initScanner() { if (!html5QrCode) html5QrCode = new Html5Qrcode("reader"); }

        function setScanMode(mode) {
            const camArea = document.getElementById('scan-camera-area');
            const fileArea = document.getElementById('scan-file-area');
            const btnCam = document.getElementById('btn-mode-cam');
            const btnFile = document.getElementById('btn-mode-file');
            if (mode === 'camera') {
                camArea.classList.remove('hidden');
                fileArea.classList.add('hidden');
                btnCam.classList.add('bg-white', 'text-fresh-primary', 'shadow-sm');
                btnCam.classList.remove('bg-transparent', 'text-slate-500');
                btnFile.classList.remove('bg-white', 'text-fresh-primary', 'shadow-sm');
                btnFile.classList.add('bg-transparent', 'text-slate-500');
            } else {
                camArea.classList.add('hidden');
                fileArea.classList.remove('hidden');
                btnFile.classList.add('bg-white', 'text-fresh-primary', 'shadow-sm');
                btnFile.classList.remove('bg-transparent', 'text-slate-500');
                btnCam.classList.remove('bg-white', 'text-fresh-primary', 'shadow-sm');
                btnCam.classList.add('bg-transparent', 'text-slate-500');
                stopCamera();
            }
            document.getElementById('scan-result').classList.add('hidden');
        }

        function requestCamera() {
            const btnCamReq = document.getElementById('btn-request-cam');
            btnCamReq.classList.add('btn-processing');
            btnCamReq.innerText = 'MEMPROSES...';

            setTimeout(() => {
                document.getElementById('camera-permission-area').classList.add('hidden');
                document.getElementById('reader').classList.remove('hidden');
                btnCamReq.classList.remove('btn-processing');
                btnCamReq.innerText = 'Izinkan Akses';
                startCamera();
            }, 500);
        }

        function startCamera() {
            if (isCameraRunning) return;
            initScanner();
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 15, qrbox: (width, height) => { return { width: width * 0.75, height: width * 0.75 }; } }, 
                onScanSuccess, 
                onScanFailure
            )
            .then(() => { isCameraRunning = true; })
            .catch(err => { 
                document.getElementById('camera-permission-area').classList.remove('hidden');
                document.getElementById('reader').classList.add('hidden');
                showToast("Gagal mengakses kamera");
            });
        }

        function stopCamera() {
            if (html5QrCode && isCameraRunning) {
                html5QrCode.stop().then(() => { 
                    isCameraRunning = false; 
                    document.getElementById('camera-permission-area').classList.remove('hidden');
                    document.getElementById('reader').classList.add('hidden');
                });
            }
        }

        function scanFile(input) {
            if (input.files.length === 0) return;
            
            const dropArea = document.getElementById('file-drop-area');
            dropArea.classList.add('btn-processing');
            
            initScanner();
            
            setTimeout(() => {
                html5QrCode.scanFile(input.files[0], true)
                    .then(res => {
                        dropArea.classList.remove('btn-processing');
                        onScanSuccess(res);
                    })
                    .catch(err => { 
                        dropArea.classList.remove('btn-processing');
                        showToast("Gagal scan file"); 
                    });
            }, 800);
        }

        function onScanSuccess(decodedText) {
            stopCamera();
            document.getElementById('scan-result').classList.remove('hidden');
            const wifiCard = document.getElementById('wifi-result-card');
            const generalCard = document.getElementById('general-result-card');
            if (decodedText.startsWith("WIFI:")) {
                wifiCard.classList.remove('hidden');
                generalCard.classList.add('hidden');
                const ssidMatch = decodedText.match(/S:([^;]+)/);
                const passMatch = decodedText.match(/P:([^;]+)/);
                const typeMatch = decodedText.match(/T:([^;]+)/);
                let ssid = ssidMatch ? ssidMatch[1] : 'Unknown';
                ssid = ssid.replace(/^"(.*)"$/, '$1');
                try { ssid = decodeURIComponent(ssid); } catch(e) {}
                let pass = passMatch ? passMatch[1] : '';
                pass = pass.replace(/^"(.*)"$/, '$1');
                const type = typeMatch ? typeMatch[1] : 'WPA';
                currentWifiPass = pass;
                document.getElementById('res-ssid').innerText = ssid;
                document.getElementById('res-pass').innerText = pass;
                document.getElementById('res-auth').innerText = type;
                if (type.toLowerCase() === 'nopass' || !pass) {
                    document.getElementById('res-pass-container').classList.add('hidden');
                } else {
                    document.getElementById('res-pass-container').classList.remove('hidden');
                }
                const btnConnect = document.getElementById('btn-connect-wifi');
                btnConnect.onclick = () => {
                    navigator.clipboard.writeText(pass);
                    window.location.href = decodedText;
                    showToast(`Sandi tersalin. Tempel di pengaturan Wi-Fi.`);
                };
            } else {
                wifiCard.classList.add('hidden');
                generalCard.classList.remove('hidden');
                document.getElementById('scan-result-text').innerText = decodedText;
                const linkBtn = document.getElementById('scan-result-link');
                if (isValidURL(decodedText)) {
                    linkBtn.href = decodedText;
                    linkBtn.classList.remove('hidden');
                } else {
                    linkBtn.classList.add('hidden');
                }
            }
        }

        function onScanFailure(error) {}

        function copyResult() {
            const textContent = document.getElementById('scan-result-text').innerText;
            navigator.clipboard.writeText(textContent).then(() => { showToast("Teks berhasil disalin!"); });
        }

        function copyWifiPass() {
            if(currentWifiPass) {
                navigator.clipboard.writeText(currentWifiPass).then(() => { showToast("Password Wi-Fi disalin!"); });
            }
        }

        function isValidURL(string) { try { new URL(string); return true; } catch (_) { return false; } }
    </script>
</body>
</html>
